<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Persona</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="card">
        <div class="card-header">
            <h2 th:text="${persona.id == null} ? 'Nueva Persona' : 'Editar Persona'"></h2>
        </div>
        <div class="card-body">
            <form th:action="${persona.id == null} ? @{/crud/personas/guardar} : @{/crud/personas/actualizar/{id}(id=${persona.id})}" 
                  th:object="${persona}" method="post">
                
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" th:field="*{nombre}" class="form-control" id="nombre" required placeholder="Ej: Mamandi">
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success" th:text="${persona.id == null} ? 'Guardar' : 'Actualizar'"></button>
                    <a th:href="@{/crud/personas}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
