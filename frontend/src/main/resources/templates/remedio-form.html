<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Persona</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="card">
        <div class="card-header">
            <h2 th:text="${remedio.id == null} ? 'Nuevo Remedio' : 'Editar Remedio'"></h2>
        </div>
        <div class="card-body">
            <form th:action="${remedio.id == null} ? @{/crud/remedio/guardar} : @{/crud/remedio/actualizar/{id}(id=${remedio.id})}" 
                  th:object="${remedio}" method="post">
                
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="nombre">Nombre Cientifico:</label>
                    <input type="text" th:field="*{nombreCientifico}" class="form-control" id="nombreCientifico" required placeholder="Ingrese Nombre Cientifico">
                </div>
                <div class="form-group">
                    <label for="nombre">Marca:</label>
                    <input type="text" th:field="*{marca}" class="form-control" id="marca" required placeholder="Ingrese Marca">
                </div>
                <div class="form-group">
                    <label for="nombre">Gramos:</label>
                    <input type="number" th:field="*{gramos}" class="form-control" id="gramos" required placeholder="Ingrese Gramos" default="0">
                </div>
                <div class="form-group">
                    <label for="nombre">Anio:</label>
                    <input type="number" th:field="*{anio}" class="form-control" id="anio" required placeholder="Ingrese Año">
                </div>
                <div class="form-group">
                    <label for="nombre">Tipo:</label>
                    <input type="text" th:field="*{tipo}" class="form-control" id="tipo" maxlength="1" required placeholder="Ej: M, B, G (solo una letra)">
                </div>
                <div class="form-group">
                    <label for="nombre">Esta controlado?</label>
                    <select th:field="*{controlado}" class="form-control" id="controlado" required>
                        <option value="true">Sí</option>
                        <option value="false">No</option>
                    </select>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success" th:text="${remedio.id == null} ? 'Guardar' : 'Actualizar'"></button>
                    <a th:href="@{/crud/remedio}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
